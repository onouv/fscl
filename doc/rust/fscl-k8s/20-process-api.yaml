apiVersion: v1
kind: ConfigMap
metadata:
  name: process-config
  namespace: fscl-process
data:
  APP_PORT: "3000"
  APP_BASE_PATH: /fscl/v2/process
  DATABASE_HOST: postgres-svc
  DATABASE_PORT: "5432"
  DATABASE_SSLMODE: disable
  NATS_HOST: nats-svc.fscl.svc.cluster.local
  NATS_PORT: "4222"
  NATS_JETSTREAM_ENABLED: "true"
  NATS_JETSTREAM_STREAM: fscl-events
  NATS_JETSTREAM_SUBJECTS: fscl.process.*
  NATS_JETSTREAM_DURABLE_CONSUMER: process-worker
  NATS_JETSTREAM_ACK_POLICY: explicit
  NATS_JETSTREAM_ACK_WAIT: 30s
  NATS_JETSTREAM_RETENTION: limits
---
apiVersion: v1
kind: Secret
metadata:
  name: process-backend-secret
  namespace: fscl-process
type: Opaque
stringData:
  JWT_SIGNING_KEY: change-me
  SESSION_SIGNING_KEY: change-me
  NATS_USERNAME: fscl
  NATS_PASSWORD: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: process-api
  namespace: fscl-process
spec:
  replicas: 1
  selector:
    matchLabels:
      app: process-api
  template:
    metadata:
      labels:
        app: process-api
    spec:
      containers:
        - name: process-api
          image: your-registry/fscl-process:latest
          envFrom:
            - configMapRef:
                name: process-config
            - secretRef:
                name: process-backend-secret
          env:
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: process-svc
  namespace: fscl-process
spec:
  selector:
    app: process-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000