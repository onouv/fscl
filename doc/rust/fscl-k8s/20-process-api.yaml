apiVersion: v1
kind: ConfigMap
metadata:
  name: process-config
  namespace: fscl-process
data:
  APP_PORT: "3000"
  APP_BASE_PATH: /fscl/v2/process
  DATABASE_HOST: postgres-svc
  DATABASE_PORT: "5432"
  DATABASE_SSLMODE: disable
  NATS_JETSTREAM_STREAM: fscl-events
  NATS_JETSTREAM_DURABLE_CONSUMER: process-api
  NATS_JETSTREAM_ACK_POLICY: explicit
  NATS_JETSTREAM_ACK_WAIT: 30s
---
apiVersion: v1
kind: Secret
metadata:
  name: process-backend-secret
  namespace: fscl-process
type: Opaque
stringData:
  JWT_SIGNING_KEY: change-me
  SESSION_SIGNING_KEY: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: process-api
  namespace: fscl-process
spec:
  replicas: 1
  selector:
    matchLabels:
      app: process-api
  template:
    metadata:
      labels:
        app: process-api
        fscl.io/nats-client: "true"
    spec:
      containers:
        - name: process-api
          image: your-registry/fscl-process:latest
          envFrom:
            - configMapRef:
                name: process-config
            - configMapRef:
                name: process-messaging-config
            - secretRef:
                name: process-backend-secret
            - secretRef:
                name: process-messaging-secret
          env:
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: outbox-publisher
          image: your-registry/fscl-outbox-publisher:latest
          envFrom:
            - configMapRef:
                name: process-messaging-config
            - configMapRef:
                name: outbox-publisher-config
            - secretRef:
                name: process-messaging-secret
          env:
            - name: DB_HOST
              value: postgres-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: process-svc
  namespace: fscl-process
spec:
  selector:
    app: process-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000