apiVersion: v1
kind: ConfigMap
metadata:
  name: outbox-publisher-config
  namespace: fscl-process
data:
  NATS_URL: nats://nats-svc.fscl.svc.cluster.local:4222
  OUTBOX_NOTIFY_CHANNEL: process_outbox_notify
  OUTBOX_SUBJECT_PREFIX: fscl.process
  OUTBOX_BATCH_SIZE: "100"
  OUTBOX_FALLBACK_POLL_MS: "1000"
---
apiVersion: v1
kind: Secret
metadata:
  name: outbox-publisher-secret
  namespace: fscl-process
type: Opaque
stringData:
  NATS_USERNAME: fscl
  NATS_PASSWORD: change-me