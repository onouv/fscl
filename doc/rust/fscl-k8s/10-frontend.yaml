apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: fscl
data:
  FSCL_APP_BASE_PATH: /fscl/v2/app
  FSCL_PROCESS_API_BASE_URL: http://fscl.apps-crc.testing/fscl/v2/process
  FSCL_RUNTIME_CONFIG: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fscl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/fscl-frontend:latest
          envFrom:
            - configMapRef:
                name: frontend-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: fscl
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080