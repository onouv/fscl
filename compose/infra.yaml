name: fscl-dev

services:
  nats:
    image: nats:2.11-alpine
    command:
      - /bin/sh
      - -ec
      - >
        exec nats-server
        --name fscl-nats
        --server_name fscl-nats
        --port 4222
        --http_port 8222
        --jetstream
        --store_dir /data/jetstream
        --user "$${NATS_USERNAME}"
        --pass "$${NATS_PASSWORD}"
    environment:
      NATS_USERNAME: fscl
      NATS_PASSWORD: change-me
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

volumes:
  nats-data: