apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: fscl
data:
  NATS_SERVER_NAME: fscl-nats
  NATS_PORT: "4222"
  NATS_MONITOR_PORT: "8222"
  NATS_STORE_DIR: /data/jetstream
  NATS_MAX_MEMORY_STORE: 128Mb
  NATS_MAX_FILE_STORE: 1Gb
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-secret
  namespace: fscl
type: Opaque
stringData:
  NATS_USERNAME: fscl
  NATS_PASSWORD: change-me
---
apiVersion: v1
kind: Service
metadata:
  name: nats-svc
  namespace: fscl
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: fscl
spec:
  serviceName: nats-svc
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nats
          image: nats:2.11-alpine
          command:
            - /bin/sh
            - -ec
          args:
            - >
              exec nats-server
              --name "${NATS_SERVER_NAME}"
              --server_name "${NATS_SERVER_NAME}"
              --port "${NATS_PORT}"
              --http_port "${NATS_MONITOR_PORT}"
              --user "${NATS_USERNAME}"
              --pass "${NATS_PASSWORD}"
              --jetstream
              --store_dir "${NATS_STORE_DIR}"
              --max_memory_store "${NATS_MAX_MEMORY_STORE}"
              --max_file_store "${NATS_MAX_FILE_STORE}"
          envFrom:
            - configMapRef:
                name: nats-config
            - secretRef:
                name: nats-secret
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          startupProbe:
            tcpSocket:
              port: 4222
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /varz
              port: 8222
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi